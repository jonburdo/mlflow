name: "Create a podman build"
description: "This workflow can be used to create a podman build and push to quay.io from source branches."
inputs:
  IMAGE_REPO:
    description: "Quay image repo name."
    required: true
  DOCKERFILE:
    description: "Path to Dockerfile."
    required: true
  GH_REPO:
    description: "GH org/repo that contains the dockerfile to source."
    required: true
  OVERWRITE:
    default: "false"
    description: "Whether to overwrite an existing image tag if it already exists. Set to 'true' to allow overwrite."
    required: true
  QUAY_ORG:
    description: "Quay.io organization/namespace for the image."
    required: true
  QUAY_ID:
    description: "Quay.io robot username (use secrets.QUAY_ROBOT_USERNAME)."
    required: true
  QUAY_TOKEN:
    description: "Quay.io robot token (use secrets.QUAY_ROBOT_TOKEN)."
    required: true
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
        repository: ${{ inputs.GH_REPO }}
        ref: ${{ env.SOURCE_BRANCH }}
        path: build
    - name: Login to Quay.io
      shell: bash
      env:
        QUAY_ID: ${{ inputs.QUAY_ID }}
        QUAY_TOKEN: ${{ inputs.QUAY_TOKEN }}
        REGISTRY: quay.io
      run: |
        printf '%s' "$QUAY_TOKEN" | podman login --username "$QUAY_ID" --password-stdin "$REGISTRY"
    # Tags in quay stick around as objects in api, when deleted quay adds "end_ts" time stamp on the tag.
    # To determine a tag is deleted, we need to check for the presence of this tag.
    # Also note there can be multiple tags created/deleted, thus we have 4 cases:
    # Case 1: Only 1 tag was ever created "tags: [{name:..},]"   -- no end_ts field
    # Case 2: No tag was ever created "tags: []"
    # Case 3: >1 tags were created, but they were all deleted at some point [{name:..., end_ts,..},....]  -- note they all have "end_ts" field.
    # Case 4: >1 tags were created, but the most recent one was never deleted (same as case 3, but the latest tag does not have "end_ts".
    - name: Check if Image already exists
      shell: bash
      if: inputs.OVERWRITE == 'false'
      env:
        QUAY_ORG: ${{ inputs.QUAY_ORG }}
        IMAGE_REPO: ${{ inputs.IMAGE_REPO }}
        TARGET_IMAGE_TAG: ${{ env.TARGET_IMAGE_TAG }}
      run: |
        set -euo pipefail

        IMAGE="quay.io/${QUAY_ORG}/${IMAGE_REPO}:${TARGET_IMAGE_TAG}"

        if ! tags=$(curl --fail --silent --show-error \
          --connect-timeout 10 --max-time 30 --retry 3 --retry-delay 5 \
          "https://quay.io/api/v1/repository/${QUAY_ORG}/${IMAGE_REPO}/tag/?specificTag=${TARGET_IMAGE_TAG}"); then
            echo "::error::Failed to query Quay API for tag ${TARGET_IMAGE_TAG}"
            exit 1
        fi

        latest_tag_has_end_ts=$(echo "${tags}" | yq '.tags | sort_by(.start_ts) | reverse | .[0].end_ts')
        notempty=$(echo "${tags}" | yq '.tags | any')

        if [[ "${notempty}" == "true" && "${latest_tag_has_end_ts}" == "null" ]]; then
            echo "::error::The image ${IMAGE} already exists"
            exit 1
        else
            echo "Image does not exist...proceeding with build & push."
        fi
    - name: Build image
      shell: bash
      working-directory: build
      env:
        DOCKERFILE: ${{ inputs.DOCKERFILE }}
        IMAGE: quay.io/${{ inputs.QUAY_ORG }}/${{ inputs.IMAGE_REPO }}:${{ env.TARGET_IMAGE_TAG }}
      run: |
        podman build . -f "$DOCKERFILE" -t "$IMAGE" && podman push "$IMAGE"
