name: Operator Integration Tests

# This workflow is a copy of mlflow-operator .github/workflows/integration-tests.yml
# adapted for the mlflow repo context. The operator repo is the source of truth.
#
# To update: edit the operator workflow first, then sync this copy.
# The test matrix is shared via mlflow-operator mlflow-tests/ci/integration-matrix.json.
# The sync check workflow (check-operator-workflow-sync.yml) catches drift on PRs
# that touch this file.

on:
  pull_request:

  push:
    branches:
      - master
      - main
      - rhoai-*

  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash

env:
  NAMESPACE: opendatahub
  INTEGRATION_CLUSTER_NAME: mlflow
  PYTEST_ARGS: "-v --tb=short --strict-markers --disable-warnings"
  AWS_ACCESS_KEY_ID: minio
  AWS_SECRET_ACCESS_KEY: minio123
  AWS_S3_BUCKET: mlpipeline
  MLFLOW_RUNTIME_ARTIFACT: mlflow-runtime-image
  MLFLOW_RUNTIME_IMAGE: localhost/mlflow-runtime:ci
  MLFLOW_TESTS_RUNTIME_ARTIFACT: mlflow-tests-image
  MLFLOW_TESTS_RUNTIME_IMAGE: localhost/mlflow-tests:ci
  OPERATOR_RUNTIME_ARTIFACT: mlflow-operator-image
  OPERATOR_RUNTIME_IMAGE: localhost/mlflow-operator:ci

jobs:
  resolve-operator-ref:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      operator_repository: ${{ steps.resolve.outputs.operator_repository }}
      operator_branch: ${{ steps.resolve.outputs.operator_branch }}
    steps:
      - name: Resolve operator repository and branch
        id: resolve
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          TARGET_REF: ${{ github.base_ref || github.ref_name }}
        run: |
          operator_repository="${REPOSITORY_OWNER}/mlflow-operator"

          if [[ "$REPOSITORY_OWNER" == "opendatahub-io" && "$TARGET_REF" == "master" ]]; then
            operator_branch="main"
          else
            operator_branch="$TARGET_REF"
          fi

          echo "operator_repository=$operator_repository" >> "$GITHUB_OUTPUT"
          echo "operator_branch=$operator_branch" >> "$GITHUB_OUTPUT"

  load-ci-config:
    needs: [resolve-operator-ref]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout operator CI config
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ needs.resolve-operator-ref.outputs.operator_repository }}
          ref: ${{ needs.resolve-operator-ref.outputs.operator_branch }}
          sparse-checkout: mlflow-tests/ci
          persist-credentials: false

      - name: Load integration test matrix
        id: matrix
        run: echo "matrix=$(jq -c . mlflow-tests/ci/integration-matrix.json)" >> "$GITHUB_OUTPUT"

  build-mlflow-runtime-image:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout MLflow source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve MLflow Dockerfile
        id: dockerfile
        run: |
          if [[ -f Dockerfile.konflux ]]; then
            echo "path=Dockerfile.konflux" >> "$GITHUB_OUTPUT"
          else
            echo "path=Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Build MLflow image archive
        env:
          DOCKERFILE: ${{ steps.dockerfile.outputs.path }}
        run: |
          mkdir -p runtime-image
          docker build -f "$DOCKERFILE" -t "$MLFLOW_RUNTIME_IMAGE" .
          docker save -o "runtime-image/${MLFLOW_RUNTIME_ARTIFACT}.tar" "$MLFLOW_RUNTIME_IMAGE"

      - name: Upload MLflow image artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.MLFLOW_RUNTIME_ARTIFACT }}
          path: runtime-image/${{ env.MLFLOW_RUNTIME_ARTIFACT }}.tar
          retention-days: 1
          if-no-files-found: error

  build-mlflow-operator-image:
    needs: [resolve-operator-ref]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout operator repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ needs.resolve-operator-ref.outputs.operator_repository }}
          ref: ${{ needs.resolve-operator-ref.outputs.operator_branch }}
          persist-credentials: false

      - name: Resolve operator Dockerfile
        id: dockerfile
        run: |
          if [[ -f Dockerfile.konflux ]]; then
            echo "path=Dockerfile.konflux" >> "$GITHUB_OUTPUT"
          else
            echo "path=Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Build MLflow operator image archive
        env:
          DOCKERFILE: ${{ steps.dockerfile.outputs.path }}
        run: |
          mkdir -p operator-image
          docker build -f "$DOCKERFILE" -t "$OPERATOR_RUNTIME_IMAGE" .
          docker save -o "operator-image/${OPERATOR_RUNTIME_ARTIFACT}.tar" "$OPERATOR_RUNTIME_IMAGE"

      - name: Upload MLflow operator image artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.OPERATOR_RUNTIME_ARTIFACT }}
          path: operator-image/${{ env.OPERATOR_RUNTIME_ARTIFACT }}.tar
          retention-days: 1
          if-no-files-found: error

  build-mlflow-tests-image:
    needs: [resolve-operator-ref]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout operator repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ needs.resolve-operator-ref.outputs.operator_repository }}
          ref: ${{ needs.resolve-operator-ref.outputs.operator_branch }}
          persist-credentials: false

      - name: Build MLflow tests image archive
        run: |
          mkdir -p test-image
          docker build -f mlflow-tests/images/Dockerfile.konflux -t "$MLFLOW_TESTS_RUNTIME_IMAGE" .
          docker save -o "test-image/${MLFLOW_TESTS_RUNTIME_ARTIFACT}.tar" "$MLFLOW_TESTS_RUNTIME_IMAGE"

      - name: Upload MLflow tests image artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.MLFLOW_TESTS_RUNTIME_ARTIFACT }}
          path: test-image/${{ env.MLFLOW_TESTS_RUNTIME_ARTIFACT }}.tar
          retention-days: 1
          if-no-files-found: error

  integration-tests:
    needs:
      [
        resolve-operator-ref,
        load-ci-config,
        build-mlflow-runtime-image,
        build-mlflow-operator-image,
        build-mlflow-tests-image,
      ]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix: ${{ fromJSON(needs.load-ci-config.outputs.matrix) }}
      fail-fast: false
    name: Integration tests - K8s=${{ matrix.k8s_version }} artifacts=${{ matrix.artifact_backends }} backend=${{ matrix.backend_store }} registry=${{ matrix.registry_store }}

    steps:
      - name: Checkout operator repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ needs.resolve-operator-ref.outputs.operator_repository }}
          ref: ${{ needs.resolve-operator-ref.outputs.operator_branch }}
          persist-credentials: false

      - name: Free up disk space
        run: |
          sudo apt-get remove -y --purge 'liblldb-*' || true
          sudo apt-get autoremove -y || true
          docker system prune -af || true

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          version: v0.29.0
          node_image: kindest/node:${{ matrix.k8s_version }}
          cluster_name: ${{ env.INTEGRATION_CLUSTER_NAME }}
          registry: "true"

      - name: Download MLflow operator image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.OPERATOR_RUNTIME_ARTIFACT }}
          path: operator-image

      - name: Load MLflow operator image into Kind cluster
        run: |
          docker load -i "operator-image/${OPERATOR_RUNTIME_ARTIFACT}.tar"
          kind load docker-image "$OPERATOR_RUNTIME_IMAGE" --name "$INTEGRATION_CLUSTER_NAME"

      - name: Download MLflow runtime image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.MLFLOW_RUNTIME_ARTIFACT }}
          path: runtime-image

      - name: Load MLflow runtime image into Kind cluster
        run: |
          docker load -i "runtime-image/${MLFLOW_RUNTIME_ARTIFACT}.tar"
          kind load docker-image "$MLFLOW_RUNTIME_IMAGE" --name "$INTEGRATION_CLUSTER_NAME"

      - name: Download MLflow tests image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.MLFLOW_TESTS_RUNTIME_ARTIFACT }}
          path: test-image

      - name: Load MLflow tests image
        run: docker load -i "test-image/${MLFLOW_TESTS_RUNTIME_ARTIFACT}.tar"

      - name: Run integration tests
        id: run-tests
        continue-on-error: true
        env:
          ARTIFACT_BACKENDS: ${{ matrix.artifact_backends }}
          BACKEND_STORE: ${{ matrix.backend_store }}
          REGISTRY_STORE: ${{ matrix.registry_store }}
          SERVE_ARTIFACTS: ${{ matrix.serve_artifacts }}
          POSTGRES_TLS: ${{ matrix.postgres_tls || 'false' }}
          SEAWEEDFS_TLS: ${{ matrix.seaweedfs_tls || 'false' }}
          WORKSPACE_LABEL_SELECTOR: ${{ matrix.workspace_label_selector || '' }}
          TEST_RESULTS_DIR: test-results
        run: mlflow-tests/images/run-integration-tests.sh

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: "!cancelled()"
        with:
          name: integration-test-results-${{ matrix.k8s_version }}-${{ matrix.backend_store }}-${{ matrix.registry_store }}-${{ matrix.artifact_backends }}-${{ matrix.serve_artifacts }}-postgres_tls_${{ matrix.postgres_tls || 'false' }}-seaweedfs_tls_${{ matrix.seaweedfs_tls || 'false' }}
          path: test-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Collect debug logs
        if: failure() && !cancelled()
        continue-on-error: true
        run: |
          mlflow-tests/images/collect-debug-logs.sh \
            --namespace "$NAMESPACE" \
            --output-dir debug-logs

      - name: Upload debug logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: failure() && !cancelled()
        with:
          name: debug-logs-${{ matrix.k8s_version }}-${{ matrix.backend_store }}-${{ matrix.registry_store }}-${{ matrix.artifact_backends }}-${{ matrix.serve_artifacts }}-postgres_tls_${{ matrix.postgres_tls || 'false' }}-seaweedfs_tls_${{ matrix.seaweedfs_tls || 'false' }}
          path: debug-logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Mark workflow failure if tests failed
        if: steps.run-tests.outcome != 'success' && !cancelled()
        run: exit 1
